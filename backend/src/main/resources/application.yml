# ==========================================================================
# Configuration de base (commune à tous les profils)
# Les blocs spécifiques par profil (local / test / prod) sont définis plus bas.
# La configuration DataSource / Flyway sera ajoutée à l'étape 3 (data layer).
# ==========================================================================
spring:
  application:
    name: atlas
  # Profil actif par défaut en l'absence de SPRING_PROFILES_ACTIVE
  profiles:
    default: local

server:
  port: 8080

# JPA / Hibernate (commun à tous les profils)
spring.jpa:
  open-in-view: false           # anti-pattern à éviter : pas de session ouverte sur la couche web
  hibernate:
    ddl-auto: validate          # le schéma est géré par Flyway, jamais par Hibernate (ADR-008)

# Flyway : migrations versionnées (ADR-008)
spring.flyway:
  enabled: true
  locations: classpath:db/migration

# Actuator : on expose explicitement health + info (pas tout, par principe de moindre exposition)
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized

# springdoc-openapi : doc API auto-générée + Swagger UI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

---
# ==========================================================================
# Profil LOCAL — développement sur la machine du dev
# ==========================================================================
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/atlas
    username: atlas
    password: atlas
    driver-class-name: org.postgresql.Driver

---
# ==========================================================================
# Profil TEST — exécution des tests (Testcontainers fournira la DB, étape 3)
# ==========================================================================
spring:
  config:
    activate:
      on-profile: test

---
# ==========================================================================
# Profil PROD — déploiement sur le VPS (Dokploy)
# Logs structurés JSON et DataSource seront configurés aux étapes dédiées.
# ==========================================================================
spring:
  config:
    activate:
      on-profile: prod
