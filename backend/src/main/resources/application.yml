# ==========================================================================
# Configuration de base (commune à tous les profils)
# Les blocs spécifiques par profil (local / test / prod) sont définis plus bas.
# La configuration DataSource / Flyway sera ajoutée à l'étape 3 (data layer).
# ==========================================================================
spring:
  application:
    name: atlas
  # Profil actif par défaut en l'absence de SPRING_PROFILES_ACTIVE
  profiles:
    default: local

server:
  port: 8080
  servlet:
    session:
      cookie:
        http-only: true       # inaccessible au JS (anti-XSS sur le cookie de session)
        same-site: lax        # le cookie suit les navigations top-level, bloque la plupart des CSRF
        secure: false         # passé à true en prod (cookie envoyé uniquement en HTTPS)

# JPA / Hibernate (commun à tous les profils)
spring.jpa:
  open-in-view: false           # anti-pattern à éviter : pas de session ouverte sur la couche web
  hibernate:
    ddl-auto: validate          # le schéma est géré par Flyway, jamais par Hibernate (ADR-008)

# Flyway : migrations versionnées (ADR-008)
spring.flyway:
  enabled: true
  locations: classpath:db/migration

# Actuator : on expose explicitement health + info (pas tout, par principe de moindre exposition)
management:
  endpoints:
    web:
      exposure:
        include: health, info
      # CORS pour le frontend Angular en dev (localhost:4200) — l'endpoint /actuator/health
      # est appelé en cross-origin par la page Hello world. Les futurs endpoints /api auront
      # leur propre config CORS (WebMvc) au sprint 1.
      cors:
        allowed-origins: "http://localhost:4200"
        allowed-methods: GET
  endpoint:
    health:
      show-details: when-authorized

# springdoc-openapi : doc API auto-générée + Swagger UI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# Atlas — config applicative (ADR-013)
atlas:
  frontend:
    # Base de l'URL du frontend, utilisée pour construire le lien magique. Surchargée en prod.
    base-url: http://localhost:4200
  email:
    from: "Atlas <onboarding@resend.dev>"
    resend:
      # Clé d'API Resend : fournie par variable d'env en prod, vide ailleurs (LogOnly n'en a pas besoin).
      api-key: ${RESEND_API_KEY:}

---
# ==========================================================================
# Profil LOCAL — développement sur la machine du dev
# ==========================================================================
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/atlas
    username: atlas
    password: atlas
    driver-class-name: org.postgresql.Driver

---
# ==========================================================================
# Profil TEST — exécution des tests (Testcontainers fournira la DB, étape 3)
# ==========================================================================
spring:
  config:
    activate:
      on-profile: test

---
# ==========================================================================
# Profil PROD — déploiement sur le VPS (Dokploy)
# Logs structurés JSON et DataSource seront configurés aux étapes dédiées.
# ==========================================================================
spring:
  config:
    activate:
      on-profile: prod

# En prod, le lien magique pointe vers le vrai domaine du frontend (variable d'env).
atlas:
  frontend:
    base-url: ${ATLAS_FRONTEND_BASE_URL:https://atlas.example}

# Cookie de session en HTTPS uniquement.
server:
  servlet:
    session:
      cookie:
        secure: true
